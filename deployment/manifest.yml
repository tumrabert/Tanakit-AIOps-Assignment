apiVersion: v1
kind: deployment
metadata:
  name: agent-api
  environment: production

spec:
  replicas: 2
  
  container:
    name: agent-api
    # TODO: This should be updated by the CD pipeline
    image_tag: "168836b48f5ddace7a25a6ee295d469286140539"
    port: 8080
    
    env:
      - name: PROMPT_VERSION
        value: "v1.0.0"
    
    resources:
      cpu: "500m"
      memory: "512Mi"
    
    healthcheck:
      path: /healthz
      interval: 10s
      timeout: 5s

